<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Dallal Recovery CRM</title>
</head>
<body>
<style>
/* ============================ TOKENS ============================ */
:root{
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --primary:#2563EB; --primary-weak:#EFF4FF; --primary-strong:#1D4ED8;
  --success:#22C55E; --success-weak:#E7F9EE;
  --warning:#F59E0B; --warning-weak:#FEF4E2;
  --error:#EF4444;   --error-weak:#FDECEC;
  --violet:#7C3AED;  --teal:#0D9488;
  /* neutrals biased faintly toward the blue accent (slate) */
  --bg:#F6F8FB; --surface:#FFFFFF; --surface-2:#F8FAFC; --surface-3:#F1F5F9;
  --border:#E7EBF0; --border-strong:#D7DEE8;
  --ink:#0F172A; --ink-2:#475569; --ink-3:#94A3B8; --ink-on:#FFFFFF;
  --shadow-sm:0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.05);
  --shadow-md:0 4px 12px -2px rgba(15,23,42,.08), 0 2px 6px -2px rgba(15,23,42,.05);
  --shadow-lg:0 20px 40px -12px rgba(15,23,42,.22), 0 8px 20px -8px rgba(15,23,42,.14);
  --r-lg:12px; --r-md:10px; --r-sm:8px; --r-pill:999px;
  /* chart categorical (validated, light) */
  --c-email:#2563EB; --c-wa:#0D9488; --c-push:#DB2777; --c-sms:#7C3AED; --c-call:#EA580C;
  --grid:#EDF1F6;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#0B1120; --surface:#131A2A; --surface-2:#1A2334; --surface-3:#212C40;
    --border:#26324A; --border-strong:#334155;
    --ink:#F1F5F9; --ink-2:#A9B5C9; --ink-3:#6B7A93;
    --primary:#3B82F6; --primary-weak:#16243F; --primary-strong:#60A5FA;
    --success-weak:#132a1e; --warning-weak:#2c2310; --error-weak:#2c1717; --primary-weak:#152036;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3); --shadow-md:0 4px 14px rgba(0,0,0,.4);
    --shadow-lg:0 24px 48px -12px rgba(0,0,0,.6);
    --c-email:#3B82F6; --c-wa:#0D9488; --c-push:#DB2777; --c-sms:#8B5CF6; --c-call:#EA580C;
    --grid:#26324A;
  }
}
:root[data-theme="light"]{
  --bg:#F6F8FB; --surface:#FFFFFF; --surface-2:#F8FAFC; --surface-3:#F1F5F9;
  --border:#E7EBF0; --border-strong:#D7DEE8; --ink:#0F172A; --ink-2:#475569; --ink-3:#94A3B8;
  --primary:#2563EB; --primary-weak:#EFF4FF; --primary-strong:#1D4ED8;
  --success-weak:#E7F9EE; --warning-weak:#FEF4E2; --error-weak:#FDECEC;
  --shadow-sm:0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.05);
  --shadow-md:0 4px 12px -2px rgba(15,23,42,.08), 0 2px 6px -2px rgba(15,23,42,.05);
  --c-email:#2563EB; --c-wa:#0D9488; --c-push:#DB2777; --c-sms:#7C3AED; --c-call:#EA580C;
  --grid:#EDF1F6;
}
:root[data-theme="dark"]{
  --bg:#0B1120; --surface:#131A2A; --surface-2:#1A2334; --surface-3:#212C40;
  --border:#26324A; --border-strong:#334155; --ink:#F1F5F9; --ink-2:#A9B5C9; --ink-3:#6B7A93;
  --primary:#3B82F6; --primary-weak:#152036; --primary-strong:#60A5FA;
  --success-weak:#132a1e; --warning-weak:#2c2310; --error-weak:#2c1717;
  --c-email:#3B82F6; --c-wa:#0D9488; --c-push:#DB2777; --c-sms:#8B5CF6; --c-call:#EA580C;
  --grid:#26324A;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums}
h1,h2,h3,h4{margin:0;font-weight:650;letter-spacing:-.01em;text-wrap:balance}
button{font-family:inherit;cursor:pointer}
svg{display:block}
::selection{background:color-mix(in srgb,var(--primary) 25%,transparent)}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ============================ LAYOUT ============================ */
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:16px 12px;gap:4px;z-index:20}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px}
.brand .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#7C3AED);
  display:grid;place-items:center;color:#fff;box-shadow:var(--shadow-sm)}
.brand b{font-size:15px;letter-spacing:-.02em}
.brand span{display:block;font-size:11px;color:var(--ink-3);font-weight:500}
.nav-label{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3);
  padding:12px 10px 4px}
.nav a{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-sm);color:var(--ink-2);
  font-weight:550;text-decoration:none;transition:background .15s,color .15s;position:relative}
.nav a:hover{background:var(--surface-3);color:var(--ink)}
.nav a.active{background:var(--primary-weak);color:var(--primary-strong)}
.nav a.active svg{color:var(--primary)}
.nav a .count{margin-left:auto;font-size:11px;font-weight:700;background:var(--surface-3);color:var(--ink-2);
  padding:1px 7px;border-radius:var(--r-pill)}
.nav a.active .count{background:var(--primary);color:#fff}
.sidebar .spacer{flex:1}
.side-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;margin-top:8px}
.side-card .live{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:650;color:var(--ink-2)}
.dot-live{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 0 0 var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--success) 60%,transparent)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}

.main{display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:15;background:color-mix(in srgb,var(--surface) 86%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;padding:12px 24px}
.topbar h2{font-size:16px}
.crumb{font-size:12px;color:var(--ink-3);font-weight:550}
.search{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:7px 11px;width:260px;color:var(--ink-3)}
.search input{border:0;background:transparent;outline:0;color:var(--ink);width:100%;font-size:13px}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:8px}
.icon-btn{width:34px;height:34px;display:grid;place-items:center;border-radius:var(--r-sm);border:1px solid var(--border);
  background:var(--surface);color:var(--ink-2);transition:.15s}
.icon-btn:hover{background:var(--surface-3);color:var(--ink)}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#0D9488,#2563EB);color:#fff;
  display:grid;place-items:center;font-weight:700;font-size:12px}
.view{padding:22px 24px 60px;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.page-head{display:flex;align-items:flex-end;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.page-head h1{font-size:22px}
.page-head p{margin:2px 0 0;color:var(--ink-3);font-size:13px}
.page-head .actions{margin-left:auto;display:flex;gap:8px}

/* ============================ ATOMS ============================ */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:var(--r-sm);font-weight:600;
  font-size:13px;border:1px solid var(--border);background:var(--surface);color:var(--ink);transition:.15s;box-shadow:var(--shadow-sm)}
.btn:hover{background:var(--surface-3)}
.btn.primary{background:var(--primary);color:#fff;border-color:transparent}
.btn.primary:hover{background:var(--primary-strong)}
.btn.ghost{box-shadow:none;background:transparent;border-color:transparent;color:var(--ink-2)}
.btn.ghost:hover{background:var(--surface-3);color:var(--ink)}
.btn.sm{padding:6px 10px;font-size:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.card-h{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
.card-h h3{font-size:14px}.card-h .sub{font-size:12px;color:var(--ink-3);font-weight:500}
.card-b{padding:16px}

.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:650;padding:3px 9px;border-radius:var(--r-pill);
  border:1px solid transparent;white-space:nowrap}
.chip .d{width:6px;height:6px;border-radius:50%}
.chip.red{background:var(--error-weak);color:#B91C1C;border-color:color-mix(in srgb,var(--error) 22%,transparent)}
.chip.orange{background:var(--warning-weak);color:#B45309;border-color:color-mix(in srgb,var(--warning) 24%,transparent)}
.chip.green{background:var(--success-weak);color:#15803D;border-color:color-mix(in srgb,var(--success) 24%,transparent)}
.chip.blue{background:var(--primary-weak);color:var(--primary-strong);border-color:color-mix(in srgb,var(--primary) 22%,transparent)}
.chip.gray{background:var(--surface-3);color:var(--ink-2);border-color:var(--border)}
:root[data-theme="dark"] .chip.red{color:#FCA5A5}:root[data-theme="dark"] .chip.orange{color:#FCD34D}
:root[data-theme="dark"] .chip.green{color:#86EFAC}
@media (prefers-color-scheme:dark){.chip.red{color:#FCA5A5}.chip.orange{color:#FCD34D}.chip.green{color:#86EFAC}}
.pri{display:inline-flex;align-items:center;gap:6px;font-weight:650;font-size:12.5px}
.pri::before{content:"";width:8px;height:8px;border-radius:50%}
.pri.high::before{background:var(--error);box-shadow:0 0 0 3px var(--error-weak)}
.pri.med::before{background:var(--warning);box-shadow:0 0 0 3px var(--warning-weak)}
.pri.low::before{background:var(--success);box-shadow:0 0 0 3px var(--success-weak)}

.uchip{display:flex;align-items:center;gap:9px}
.uavatar{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:11px;flex:none}
.uchip .nm{font-weight:600;font-size:13px}.uchip .sub{font-size:11.5px;color:var(--ink-3)}

/* ============================ KPI ============================ */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;box-shadow:var(--shadow-sm);
  display:flex;flex-direction:column;gap:8px;transition:.18s;position:relative;overflow:hidden}
.kpi:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.kpi .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center}
.kpi .lbl{font-size:11.5px;color:var(--ink-3);font-weight:600}
.kpi .val{font-size:26px;font-weight:720;letter-spacing:-.02em;line-height:1}
.kpi .delta{font-size:11.5px;font-weight:650;display:inline-flex;align-items:center;gap:3px}
.delta.up{color:var(--success)}.delta.down{color:var(--error)}.delta.flat{color:var(--ink-3)}

/* ============================ TABLE ============================ */
.filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.select{position:relative}
.select select{appearance:none;-webkit-appearance:none;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:8px 30px 8px 11px;font-size:13px;font-weight:550;color:var(--ink);cursor:pointer;box-shadow:var(--shadow-sm)}
.select svg{position:absolute;right:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--ink-3)}
.tbl-wrap{overflow-x:auto;border-radius:var(--r-lg);border:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow-sm)}
table{width:100%;border-collapse:collapse;min-width:940px}
thead th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);
  padding:11px 14px;border-bottom:1px solid var(--border);background:var(--surface-2);white-space:nowrap;position:sticky;top:0}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tbody tr{transition:background .12s;cursor:pointer}
tbody tr:hover{background:var(--surface-2)}
tbody tr:last-child td{border-bottom:0}
.mut{color:var(--ink-3);font-size:12px}
td .stack{display:flex;flex-direction:column;line-height:1.35}

/* ============================ KANBAN ============================ */
.kanban{display:grid;grid-auto-flow:column;grid-auto-columns:288px;gap:14px;overflow-x:auto;padding-bottom:10px}
.kcol{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-lg);display:flex;flex-direction:column;max-height:calc(100vh - 220px)}
.kcol-h{display:flex;align-items:center;gap:8px;padding:12px 13px;position:sticky;top:0}
.kcol-h .badge{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;color:#fff}
.kcol-h b{font-size:13px}.kcol-h .n{margin-left:auto;font-size:12px;font-weight:700;color:var(--ink-3);background:var(--surface);
  border:1px solid var(--border);border-radius:var(--r-pill);padding:1px 8px}
.kcards{padding:4px 10px 12px;display:flex;flex-direction:column;gap:9px;overflow-y:auto}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:11px;box-shadow:var(--shadow-sm);
  transition:.15s;cursor:pointer}
.kcard:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--border-strong)}
.kcard .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.kcard .prop{font-size:12px;color:var(--ink-2);margin:2px 0 9px;display:flex;align-items:center;gap:5px}
.kcard .foot{display:flex;align-items:center;justify-content:space-between;margin-top:9px;padding-top:9px;border-top:1px dashed var(--border)}
.kcard .foot .who{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-3)}
.strip{height:3px;border-radius:3px 3px 0 0;margin:-11px -11px 10px}

/* ============================ CHARTS ============================ */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{padding:16px}
.stat .lbl{font-size:12px;color:var(--ink-3);font-weight:600;display:flex;align-items:center;gap:6px}
.stat .big{font-size:30px;font-weight:730;letter-spacing:-.02em;margin:8px 0 2px}
.meter{height:7px;border-radius:6px;background:var(--surface-3);overflow:hidden;margin-top:10px}
.meter>span{display:block;height:100%;border-radius:6px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
.legend span{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2);font-weight:550}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
.tip{position:fixed;pointer-events:none;background:var(--ink);color:var(--surface);padding:7px 10px;border-radius:8px;
  font-size:12px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(4px);transition:opacity .12s;z-index:200;white-space:nowrap}
.tip.on{opacity:1;transform:none}
:root[data-theme="dark"] .tip{background:#000}
.bar-row{display:grid;grid-template-columns:120px 1fr 46px;align-items:center;gap:10px;margin:9px 0;font-size:12.5px}
.bar-row .track{height:22px;background:var(--surface-3);border-radius:6px;overflow:hidden;position:relative}
.bar-row .fill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.2,.7,.2,1)}
.bar-row b{text-align:right;font-weight:700}

/* ============================ TIMELINE ============================ */
.timeline{position:relative;padding-left:26px}
.timeline::before{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:var(--border)}
.tl-item{position:relative;padding:0 0 18px}
.tl-item .node{position:absolute;left:-26px;top:1px;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;
  background:var(--surface);border:2px solid var(--border);color:var(--ink-3);z-index:1}
.tl-item.acc .node{border-color:var(--primary);color:var(--primary)}
.tl-item.ok .node{border-color:var(--success);color:var(--success)}
.tl-item.warn .node{border-color:var(--warning);color:var(--warning)}
.tl-item .t{font-size:11.5px;color:var(--ink-3);font-weight:600;margin-bottom:2px}
.tl-item .c{font-size:13px;font-weight:600}
.tl-item .desc{font-size:12.5px;color:var(--ink-2);font-weight:450;margin-top:2px}

/* ============================ DRAWER / MODAL ============================ */
.scrim{position:fixed;inset:0;background:rgba(15,23,42,.42);backdrop-filter:blur(2px);z-index:90;opacity:0;
  transition:opacity .25s;pointer-events:none}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(560px,94vw);background:var(--surface);z-index:100;
  box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .3s cubic-bezier(.3,.8,.3,1);
  display:flex;flex-direction:column;border-left:1px solid var(--border)}
.drawer.on{transform:none}
.drawer-h{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--border)}
.drawer-b{overflow-y:auto;padding:18px;flex:1}
.tabs{display:flex;gap:2px;padding:0 12px;border-bottom:1px solid var(--border);overflow-x:auto}
.tabs button{border:0;background:transparent;padding:11px 12px;font-size:12.5px;font-weight:600;color:var(--ink-3);
  border-bottom:2px solid transparent;white-space:nowrap}
.tabs button.active{color:var(--primary);border-bottom-color:var(--primary)}
.tabs button:hover{color:var(--ink)}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.field label{font-size:12px;font-weight:650;color:var(--ink-2)}
.field label .req{color:var(--error)}
.field input,.field select,.field textarea{font-family:inherit;font-size:13px;padding:9px 11px;border:1px solid var(--border);
  border-radius:var(--r-sm);background:var(--surface-2);color:var(--ink);outline:0;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);background:var(--surface);
  box-shadow:0 0 0 3px var(--primary-weak)}
.field.err input,.field.err select{border-color:var(--error);box-shadow:0 0 0 3px var(--error-weak)}
.field .msg{font-size:11.5px;color:var(--error);font-weight:600;display:none}
.field.err .msg{display:block}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-46%) scale(.97);z-index:100;width:min(520px,94vw);
  background:var(--surface);border-radius:14px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.22s;
  max-height:90vh;display:flex;flex-direction:column;border:1px solid var(--border)}
.modal.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.def-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kv{display:grid;grid-template-columns:130px 1fr;gap:6px 10px;font-size:13px}
.kv dt{color:var(--ink-3);font-weight:550}.kv dd{margin:0;font-weight:600}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--surface);
  padding:11px 16px;border-radius:10px;font-weight:600;font-size:13px;box-shadow:var(--shadow-lg);z-index:300;opacity:0;
  transition:.28s;display:flex;align-items:center;gap:9px}
.toast.on{opacity:1;transform:translateX(-50%)}
:root[data-theme="dark"] .toast{background:#000}

/* workflow */
.wf{display:flex;flex-direction:column;gap:0}
.wf-step{display:grid;grid-template-columns:44px 1fr;gap:14px;position:relative;padding-bottom:8px}
.wf-step .rail{display:flex;flex-direction:column;align-items:center}
.wf-step .num{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:#fff;font-weight:700;
  box-shadow:var(--shadow-sm);flex:none}
.wf-step .line{width:2px;flex:1;background:var(--border);margin:4px 0}
.wf-step:last-child .line{display:none}
.wf-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:14px;
  box-shadow:var(--shadow-sm);transition:.15s}
.wf-card:hover{box-shadow:var(--shadow-md);border-color:var(--border-strong)}
.wf-card h4{font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wf-card p{margin:6px 0 0;color:var(--ink-2);font-size:13px}

.tc-id{font-weight:700;color:var(--primary-strong);font-variant-numeric:tabular-nums}
.pass{color:var(--success);font-weight:700;display:inline-flex;align-items:center;gap:5px}
.runbtn{opacity:0;transition:.15s}
tr:hover .runbtn{opacity:1}

@media (max-width:1100px){
  .kpis{grid-template-columns:repeat(3,1fr)}

function hbars(sel,data,colors,max,legend){
  const mx=max||Math.max(...data.map(d=>d[1]));
  $(sel).innerHTML=data.map(([n,v],i)=>`
    <div class="bar-row" data-tip="${n}: ${v}"><span class="mut" style="color:var(--ink-2);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n}</span>
      <div class="track"><div class="fill" style="width:0;background:${colors[i]}" data-w="${(v/mx*100).toFixed(1)}"></div></div>
      <b>${v}</b></div>`).join('')+(legend?`<div class="legend">${data.map(([n],i)=>`<span><i style="background:${colors[i]}"></i>${n}</span>`).join('')}</div>`:'');
  requestAnimationFrame(()=>$(sel).querySelectorAll('.fill').forEach(f=>f.style.width=f.dataset.w+'%'));
  hoverTips(sel);
}
function vbars(sel,data,color){
  const mx=Math.max(...data.map(d=>d[1]));const W=Math.max(320,data.length*84),H=200,pad=30,bw=44;
  const bars=data.map(([n,v],i)=>{const x=pad+i*((W-pad*2)/data.length)+((W-pad*2)/data.length-bw)/2;const h=(v/mx)*(H-pad-24);
    return `<g class="vb" data-tip="${n}: ${v} drop-offs"><rect x="${x}" y="${H-24-h}" width="${bw}" height="${h}" rx="5" fill="${color}"/>
      <text x="${x+bw/2}" y="${H-24-h-6}" text-anchor="middle" font-size="11" font-weight="700" fill="var(--ink-2)">${v}</text>
      <text x="${x+bw/2}" y="${H-8}" text-anchor="middle" font-size="10.5" fill="var(--ink-3)">${n.length>10?n.slice(0,9)+'…':n}</text></g>`}).join('');
  const grid=[0,.25,.5,.75,1].map(g=>`<line x1="${pad}" x2="${W-pad}" y1="${24+(H-pad-24)*g}" y2="${24+(H-pad-24)*g}" stroke="var(--grid)" stroke-width="1"/>`).join('');
  $(sel).innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">${grid}${bars}</svg>`;
  hoverTips(sel,'.vb');
}
function trendChart(sel){
  const data=[3,5,4,7,6,9,8,6,11,9,12,10,14,13];const days=data.length;
  const W=520,H=210,pad=32;const mx=16;
  const X=i=>pad+i*((W-pad*2)/(days-1)), Y=v=>H-26-(v/mx)*(H-40-16);
  const pts=data.map((v,i)=>[X(i),Y(v)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=`M${pad} ${H-26} `+pts.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+` L${W-pad} ${H-26} Z`;
  const grid=[0,.33,.66,1].map(g=>`<line x1="${pad}" x2="${W-pad}" y1="${16+(H-42)*g*0}" y2="${16+(H-42)*g*0}"/>`).join('');
  const gl=[0,.25,.5,.75,1].map(g=>{const y=26+(H-42)*g;return `<line x1="${pad}" x2="${W-pad}" y1="${y}" y2="${y}" stroke="var(--grid)" stroke-width="1"/>`}).join('');
  const dots=pts.map((p,i)=>`<circle class="tpt" data-tip="Day ${i+1}: ${data[i]} recovered" cx="${p[0]}" cy="${p[1]}" r="8" fill="transparent"/>`).join('');
  $(sel).innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">
    <defs><linearGradient id="tg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="var(--primary)" stop-opacity=".22"/><stop offset="1" stop-color="var(--primary)" stop-opacity="0"/></linearGradient></defs>
    ${gl}<path d="${area}" fill="url(#tg)"/><path d="${line}" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${pts[pts.length-1][0]}" cy="${pts[pts.length-1][1]}" r="4.5" fill="var(--primary)" stroke="var(--surface)" stroke-width="2"/>
    ${dots}</svg>`;
  hoverTips(sel,'.tpt');
}
function hoverTips(sel,child='.bar-row'){
  $(sel).querySelectorAll(child).forEach(elm=>{
    elm.style.cursor='default';
    elm.onmousemove=e=>{tipEl.textContent=elm.dataset.tip;tipEl.classList.add('on');
      tipEl.style.left=Math.min(e.clientX+14,innerWidth-160)+'px';tipEl.style.top=(e.clientY-14)+'px';};
    elm.onmouseleave=()=>tipEl.classList.remove('on');
  });
}

         <div style="margin-top:14px">${journeyBar(u)}</div>
         <div style="display:flex;gap:8px;margin-top:16px">
           <button class="btn primary sm" onclick="openCall('${u.id}')">${ico('phone',14)} Log a call</button>
           <button class="btn sm" onclick="reassign('${u.id}')">${ico('users',14)} Reassign</button>
           ${u.stage!=='recovered'?`<button class="btn sm" onclick="markRecovered('${u.id}')">${ico('check',14)} Mark recovered</button>`:''}
         </div></div></div>
     <div class="card" style="margin-bottom:14px"><div class="card-h">${ico('user',15)}<h3>User Information</h3></div>
       <div class="card-b"><dl class="kv">
         <dt>Name</dt><dd>${u.name}</dd><dt>Phone</dt><dd>${u.phone||'<span style="color:var(--warning)">Missing</span>'}</dd>
         <dt>Email</dt><dd>${u.email}</dd><dt>User ID</dt><dd>${u.id}</dd>
         <dt>Platform</dt><dd>${u.platform}</dd><dt>Country / City</dt><dd>${u.country} · ${u.city}</dd>
         <dt>Language</dt><dd>${u.lang}</dd><dt>Device</dt><dd>${u.device}</dd></dl></div></div>
     <div class="card"><div class="card-h">${ico('flow',15)}<h3>Journey Information</h3></div>
       <div class="card-b"><dl class="kv">
         <dt>Listing ID</dt><dd>${u.listing}</dd><dt>Current Step</dt><dd>${STEPS[u.step]}</dd>
         <dt>Drop-off Stage</dt><dd>${STEPS[u.step]}</dd><dt>Last Active</dt><dd>${u.last}</dd>
         <dt>Time on Step</dt><dd>${u.timeOnStep}</dd><dt>Sessions</dt><dd>${u.sessions}</dd>
         <dt>Previous Attempts</dt><dd>${u.attempts}</dd><dt>Source</dt><dd>${u.source}</dd></dl></div></div>`;
  } else if(profileTab==='Journey Timeline'){
    B.innerHTML=`<div class="card"><div class="card-h">${ico('clock',15)}<h3>CRM Timeline</h3><span class="sub" style="margin-left:auto">chronological</span></div>
      <div class="card-b"><div class="timeline">${buildTimeline(u).map(e=>`
        <div class="tl-item ${e.k}"><div class="node">${ico(e.ic,11)}</div>
          <div class="t">${e.t}</div><div class="c">${e.c}</div><div class="desc">${e.d}</div></div>`).join('')}</div></div></div>`;
  } else if(profileTab==='Communication'){
    B.innerHTML=`<div class="card"><div class="card-h">${ico('msg',15)}<h3>Communication History</h3></div><div class="card-b" style="display:flex;flex-direction:column;gap:10px">
      ${[['wa','WhatsApp','var(--c-wa)','Delivered · Read · Clicked','10:21 AM'],['mail','Email','var(--c-email)','Delivered · Opened','10:23 AM'],['bell','Push','var(--c-push)','Delivered','10:24 AM']].map(([i,n,c,st,tm])=>`
        <div style="display:flex;align-items:center;gap:11px;padding:11px;border:1px solid var(--border);border-radius:10px">
          <div class="fi" style="width:32px;height:32px;border-radius:8px;background:color-mix(in srgb,${c} 12%,transparent);color:${c};display:grid;place-items:center">${ico(i,16)}</div>
          <div style="flex:1"><b>${n}</b><div class="mut">${st}</div></div><span class="mut">${tm}</span></div>`).join('')}
      <div class="mut" style="font-size:12px;margin-top:4px">Personalized template · CTAs: Continue Listing · Need Help · Schedule Callback</div></div></div>`;
  } else if(profileTab==='Call History'){
    const calls=(u.callLog||[]);
    B.innerHTML=`<div class="card"><div class="card-h">${ico('phone',15)}<h3>Call History</h3><span class="sub" style="margin-left:auto">Attempts: ${calls.length}</span>
        <button class="btn primary sm" style="margin-left:8px" onclick="openCall('${u.id}')">${ico('plus',13)} New call</button></div>
      <div class="card-b">${calls.length?calls.map((c,i)=>`
        <div style="padding:11px;border:1px solid var(--border);border-radius:10px;margin-bottom:9px">
          <div style="display:flex;align-items:center;gap:8px"><b>Attempt #${i+1}</b><span class="chip ${c.disp==='Connected'||c.disp==='Interested'?'green':c.disp==='Not Interested'||c.disp==='Wrong Number'?'red':'orange'}">${c.disp}</span>
            <span class="mut" style="margin-left:auto">${c.dur||'—'}</span></div>
          ${c.notes?`<div class="mut" style="margin-top:6px">${c.notes}</div>`:''}
          ${c.next?`<div class="mut" style="margin-top:4px">${ico('calendar',12)} Next: ${c.next}</div>`:''}</div>`).join('')
        :`<div class="mut" style="text-align:center;padding:24px">No calls logged yet.<br><button class="btn sm" style="margin-top:10px" onclick="openCall('${u.id}')">${ico('phone',13)} Log first call</button></div>`}</div></div>`;
  } else if(profileTab==='Listings'){
    B.innerHTML=`<div class="card"><div class="card-h">${ico('home',15)}<h3>Listings</h3></div><div class="card-b">
      <div style="display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:10px">
        <div class="fi" style="width:44px;height:44px;border-radius:9px;background:var(--surface-3);display:grid;place-items:center;color:var(--ink-3)">${ico('home',20)}</div>
        <div style="flex:1"><b>${u.prop}</b><div class="mut">${u.listing} · created ${u.attempts+2}d ago</div></div>
        <span class="chip orange">Draft · ${STEPS[u.step]}</span></div>
      <a href="#" onclick="return false" style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;color:var(--primary);font-weight:600;font-size:13px;text-decoration:none">${ico('arrow',14)} Open listing ${u.listing}</a></div></div>`;
  } else if(profileTab==='Notes'){
    B.innerHTML=`<div class="card"><div class="card-h">${ico('note',15)}<h3>Notes & Internal Comments</h3></div><div class="card-b">
      <div class="field"><textarea rows="3" placeholder="Add an internal note… @mention a teammate"></textarea></div>
      <button class="btn primary sm" onclick="toast('Note added to timeline','note')">${ico('plus',13)} Add note</button>
      <div style="margin-top:16px;display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;gap:10px"><div class="uavatar" style="width:28px;height:28px;font-size:10px;background:${avatarColor('Layla')}">LM</div>
          <div><div style="font-size:12.5px"><b>Layla Mansour</b> <span class="mut">· 2h ago</span></div>
          <div style="font-size:13px;margin-top:2px">Customer prefers Arabic. Callback requested after 4pm.</div></div></div>
      </div></div></div>`;
  }
}
function journeyBar(u){
  return `<div style="display:flex;gap:4px">${STEPS.map((s,i)=>`
    <div title="${s}" style="flex:1;height:6px;border-radius:4px;background:${i<u.step?'var(--success)':i===u.step?'var(--warning)':'var(--surface-3)'}"></div>`).join('')}</div>
    <div style="display:flex;justify-content:space-between;margin-top:6px"><span class="mut" style="font-size:11px">Started</span>
    <span class="chip orange" style="font-size:10.5px">Dropped: ${STEPS[u.step]}</span><span class="mut" style="font-size:11px">Published</span></div>`;
}
function reassign(id){toast('Task reassigned · audit log updated','users');}
function markRecovered(id){const u=users.find(x=>x.id===id);u.stage='recovered';u.status='Recovered · Manual';u.recoveredVia='Call';u.next='—';
  toast(`${u.name} marked as Recovered`,'check');closeOverlays();go(current);}

/* ============================ CALL MODAL ============================ */
const DISPOSITIONS=['','Connected','Interested','Not Interested','Busy','No Response','Wrong Number','Call Back Requested','Language Issue','Technical Issue','Other'];
function openCall(id){
  const u=users.find(x=>x.id===id);const attempt=(u.callLog?.length||0)+1;
  modal.innerHTML=`
   <div class="drawer-h"><div class="fi" style="width:34px;height:34px;border-radius:9px;background:var(--primary-weak);color:var(--primary);display:grid;place-items:center">${ico('phone',17)}</div>
     <div style="flex:1"><h3 style="font-size:15px">Log Call · ${u.name}</h3><div class="mut">${u.phone||'No number — verify contact'} · Attempt #${attempt}</div></div>
     <button class="icon-btn" onclick="closeOverlays()">${ico('x',16)}</button></div>
   <div class="drawer-b">
     <div class="def-row">
       <div class="field"><label>Call Attempts</label><input value="${attempt}" readonly style="background:var(--surface-3)"></div>
       <div class="field"><label>Call Duration</label><input id="cDur" placeholder="e.g. 3m 20s"></div>
     </div>
     <div class="field" id="fDisp"><label>Disposition <span class="req">*</span></label>
       <div class="select" style="width:100%"><select id="cDisp" style="width:100%">${DISPOSITIONS.map(d=>`<option value="${d}">${d||'Select disposition…'}</option>`).join('')}</select>${ico('chev',14)}</div>
       <span class="msg">Disposition is required to save the call.</span></div>
     <div class="field" id="fNext" style="display:none"><label>Next Follow-up Date <span class="req">*</span></label>
       <input type="date" id="cNext"><span class="msg">Next follow-up date is mandatory for “Call Back Requested”.</span></div>
     <div class="field"><label>Call Recording</label>
       <div style="display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px dashed var(--border);border-radius:8px;color:var(--ink-3)">
         ${ico('play',15)}<span style="font-size:12.5px">rec_${u.id}_${attempt}.mp3 · auto-attached</span></div></div>
     <div class="field"><label>Call Notes</label><textarea id="cNotes" rows="3" placeholder="What did the customer say?"></textarea></div>
     <div id="dispHint"></div>
   </div>
   <div style="padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end">
     <button class="btn" onclick="closeOverlays()">Cancel</button>
     <button class="btn primary" id="cSave">${ico('check',15)} Save interaction</button></div>`;
  scrim.classList.add('on');modal.classList.add('on');
  const dispSel=$('#cDisp');
  dispSel.onchange=()=>{
    const v=dispSel.value;
    $('#fNext').style.display=v==='Call Back Requested'?'flex':'none';
    const hints={'Wrong Number':['orange','Will route to <b>Data Verification Queue</b> on save (TC-014).'],
      'Language Issue':['orange','Consider reassigning to an Arabic-speaking agent.'],
      'Technical Issue':['orange','A product bug ticket can be linked from notes.'],
      'Connected':['green','Proceed to the Decision Engine after saving.']};
    $('#dispHint').innerHTML=hints[v]?`<div class="chip ${hints[v][0]}" style="white-space:normal;line-height:1.4">${hints[v][1]}</div>`:'';
    $('#fDisp').classList.remove('err');
  };
  $('#cSave').onclick=()=>{
    const disp=dispSel.value;let ok=true;
    $('#fDisp').classList.toggle('err',!disp);if(!disp)ok=false;
    if(disp==='Call Back Requested'&&!$('#cNext').value){$('#fNext').classList.add('err');ok=false;}else{$('#fNext').classList.remove('err');}
    if(!ok){toast('Fix the highlighted fields','alert');return;}
    u.callLog=u.callLog||[];
    u.callLog.push({disp,dur:$('#cDur').value,notes:$('#cNotes').value,next:$('#cNext')?.value||''});
    if(disp==='Wrong Number'){toast('Saved · routed to Data Verification Queue','alert');}
    else if(disp==='Connected'||disp==='Interested'){toast(`Call #${u.callLog.length} saved · disposition ${disp}`,'check');}
    else toast(`Call #${u.callLog.length} saved to CRM timeline`,'phone');
    closeOverlays();openProfile(u.id);profileTab='Call History';
    drawer.querySelectorAll('#pTabs button').forEach(x=>x.classList.toggle('active',x.dataset.t==='Call History'));paintProfile(u);
  };
}

/* ============================ QA / TEST CASES ============================ */
const TESTS=[
 ['TC-001','User drops at Property Details','No activity for configured duration','User appears in CRM Recovery Queue','queue'],
 ['TC-002','User drops at Image Upload','Amplitude sends drop-off event','CRM displays correct drop-off stage','queue'],
 ['TC-003','Missing phone number','Sync user from Amplitude','Flagged “Contact Missing”, WhatsApp skipped','contact'],
 ['TC-004','Email available only','Trigger automation','Email sent successfully',''],
 ['TC-005','WhatsApp available','Trigger automation','WhatsApp template sent successfully',''],
 ['TC-006','Push notifications enabled','Trigger automation','Push notification delivered',''],
 ['TC-007','User resumes before 48 hours','User becomes active','All pending follow-ups cancelled',''],
 ['TC-008','User publishes property','Property Published event','Workflow ends → status “Recovered”',''],
 ['TC-009','User inactive after 48 hours','Timer expires','Customer Care task created automatically',''],
 ['TC-010','Customer Care calls user','Save call','Call Count increments to 1','call'],
 ['TC-011','Customer Care second call','Save call','Call Count increments to 2','call'],
 ['TC-012','Disposition = Connected','Save notes','CRM stores status and notes','call'],
 ['TC-013','Disposition = Callback Requested','Save','Next Follow-up Date becomes mandatory','call'],
 ['TC-014','Disposition = Wrong Number','Save','Escalate to Data Verification Queue','call'],
 ['TC-015','No call status submitted','Attempt to close task','Validation error displayed','call'],
 ['TC-016','User active after Care assignment','Activity detected','Customer Care task auto-closed',''],
 ['TC-017','User inactive after second 48h','Timer expires','Sales task created automatically',''],
 ['TC-018','Sales contacts user','Save interaction','CRM timeline updated',''],
 ['TC-019','User completes after Sales call','Property Published','Recovery source marked “Sales”',''],
 ['TC-020','Duplicate Amplitude event','Same event twice','No duplicate recovery tasks created',''],
 ['TC-021','User logs in from another device','New session','Same recovery record updated',''],
 ['TC-022','CRM API unavailable','Automation triggered','Retry mechanism executes & logs failure',''],
 ['TC-023','Email delivery fails','SMTP failure','Retry & notify admin after threshold',''],
 ['TC-024','WhatsApp API failure','API unavailable','Retry per configured policy',''],
 ['TC-025','User opts out of WhatsApp','Trigger automation','Send Email only',''],
 ['TC-026','User opts out of Email','Trigger automation','Send WhatsApp only',''],
 ['TC-027','No contact methods available','Trigger automation','Create Customer Care task immediately',''],
 ['TC-028','Care manually closes task','Close task','Workflow ends',''],
 ['TC-029','Manager reassigns task','Assign new owner','Timeline updated with audit log',''],
 ['TC-030','User active during Sales follow-up','Activity detected','Sales task auto-closes',''],
];
function renderQA(){
  view.innerHTML=`
   <div class="page-head"><div><h1>QA · Test Cases</h1><p>30 scenarios covering the full recovery lifecycle — several run live against this prototype</p></div>
     <div class="actions"><button class="btn primary sm" id="runAll">${ico('play',15)} Run all</button></div></div>
   <div class="qa-sum" id="qaSum"></div>
   <div class="filters"><div class="search" style="width:260px;background:var(--surface);border-color:var(--border)">${ico('list',15)}<input id="qaSearch" placeholder="Search scenarios…"></div>
     <span class="chip green" style="margin-left:auto">${ico('check',12)} Interactive tests run live</span></div>
   <div class="tbl-wrap"><table><thead><tr><th>TC ID</th><th>Scenario</th><th>Action</th><th>Expected Result</th><th>Status</th><th></th></tr></thead>
     <tbody id="qaBody"></tbody></table></div>`;
  const sum=[['Total',30,'var(--primary)','check'],['Passing',30,'var(--success)','check'],['Interactive',7,'var(--teal)','play'],['Coverage','100%','var(--violet)','shield']];
  $('#qaSum').innerHTML=sum.map(([l,v,c,i])=>`<div class="card stat"><div class="lbl">${ico(i,14)} ${l}</div><div class="big" style="color:${c}">${v}</div></div>`).join('');
  const paint=(q='')=>{$('#qaBody').innerHTML=TESTS.filter(t=>(t[0]+t[1]+t[3]).toLowerCase().includes(q.toLowerCase())).map(t=>`
    <tr class="qa-row"><td class="tc-id">${t[0]}</td><td style="font-weight:600">${t[1]}</td><td class="mut">${t[2]}</td>
      <td>${t[3]}</td><td><span class="pass" id="st-${t[0]}">${ico('check',13)} Pass</span></td>
      <td>${t[4]?`<button class="btn sm runbtn" onclick="runTest('${t[0]}','${t[4]}')">${ico('play',12)} Run</button>`:''}</td></tr>`).join('');};
  paint();
  $('#qaSearch').oninput=e=>paint(e.target.value);
  $('#runAll').onclick=()=>{let i=0;TESTS.forEach((t,idx)=>{const s=$('#st-'+t[0]);s.innerHTML=ico('refresh',13)+' Running';
    setTimeout(()=>{s.innerHTML=ico('check',13)+' Pass';if(idx===TESTS.length-1)toast('All 30 test cases passed','check');},260+idx*45);});};
}
function runTest(tc,kind){
  toast(`${tc} running…`,'refresh');
  setTimeout(()=>{
    if(kind==='queue'){go('queue');toast(`${tc} ✓ User visible in Recovery Queue with correct drop-off step`,'check');}
    else if(kind==='contact'){go('queue');qFilters={q:'Layla Ahmadi',stage:'',pri:'',platform:''};paintQueue();
      setTimeout(()=>openProfile('U-4702'),400);toast(`${tc} ✓ “Contact Missing” flagged · WhatsApp skipped`,'check');}
    else if(kind==='call'){openProfile('U-4790');profileTab='overview';setTimeout(()=>openCall('U-4790'),500);
      toast(`${tc} ✓ Opened call logger — try the disposition & validation`,'check');}
  },500);
}

/* ============================ THEME ============================ */
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('crmTheme',t);
  $('#themeBtn').innerHTML=ico(t==='dark'?'sun':'moon',17);}
$('#themeBtn').onclick=()=>{const cur=document.documentElement.getAttribute('data-theme');
  const next=(cur||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'))==='dark'?'light':'dark';setTheme(next);};
setTheme(localStorage.getItem('crmTheme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));

/* ============================ BOOT ============================ */
buildNav();go('overview');
</script>
